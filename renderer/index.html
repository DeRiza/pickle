          <td class="cell" data-row="8" data-col="7" onclick="selectCell(8,7)"></td>
          <td class="cell" data-row="8" data-col="8" onclick="selectCell(8,8)"></td>
        </tr>
      </tbody>
    </table>

    <div id="timer-row">
      <span id="timer">00:00</span>
      <button id="notes-toggle-btn" onclick="window.toggleNotesMode()">📝 笔记</button>
    </div>

    <div id="numpad">
      <button class="num-btn" onclick="handleNumClick(1)">1</button>
      <button class="num-btn" onclick="handleNumClick(2)">2</button>
      <button class="num-btn" onclick="handleNumClick(3)">3</button>
      <button class="num-btn" onclick="handleNumClick(4)">4</button>
      <button class="num-btn" onclick="handleNumClick(5)">5</button>
      <button class="num-btn" onclick="handleNumClick(6)">6</button>
      <button class="num-btn" onclick="handleNumClick(7)">7</button>
      <button class="num-btn" onclick="handleNumClick(8)">8</button>
      <button class="num-btn" onclick="handleNumClick(9)">9</button>
      <button class="num-btn erase-btn" onclick="clearCell()">⌫</button>
    </div>
  </div>

  <div id="win-modal">
    <div id="win-modal-content">
      <h2>恭喜完成！</h2>
      <button id="play-again-btn" onclick="startNewGame()">再来一局</button>
    </div>
  </div>

  <div id="lose-modal">
    <div id="lose-modal-content">
      <h2>游戏结束 😢</h2>
      <p id="lose-message">错误次数已用完</p>
      <button id="retry-btn" onclick="startNewGame()">重新开始</button>
    </div>
  </div>

  <script src="game.js"></script>
  <script>
    function startNewGame() {
      var sel = document.getElementById('difficulty-select');
      var difficulty = sel ? sel.value : 'medium';
      localStorage.setItem('sudoku_last_difficulty', difficulty);
      window.newGame(difficulty);
    }

    function handleNumClick(n) {
      var g = window.game;
      if (!g.selectedCell) {
        // No cell selected — toggle highlight mode
        if (g.highlightedNumber === n) {
          g.clearHighlight();
        } else {
          g.highlightNumber(n);
        }
      } else {
        // Cell selected — normal input
        inputNumber(n);
      }
      render();
    }

    function render() {
      var g = window.game;

      // Clear all cell classes and content
      document.querySelectorAll('.cell').forEach(function(cell) {
        cell.className = 'cell';
        cell.textContent = '';
      });

      // Render board
      for (var r = 0; r < 9; r++) {
        for (var c = 0; c < 9; c++) {
          var val = g.board[r][c];
          var cell = document.querySelector('.cell[data-row="' + r + '"][data-col="' + c + '"]');

          if (val !== 0) {
            cell.textContent = val;
            cell.classList.add(g.isGiven(r, c) ? 'cell-given' : 'cell-user');
          } else {
            // Show notes for empty cells
            var notes = g.getNotes(r, c);
            if (notes && notes.length > 0) {
              var notesGrid = document.createElement('div');
              notesGrid.className = 'cell-notes';
              for (var n = 1; n <= 9; n++) {
                var span = document.createElement('span');
                span.textContent = notes.indexOf(n) !== -1 ? n : '';
                notesGrid.appendChild(span);
              }
              cell.appendChild(notesGrid);
            }
          }

          // Conflict highlight
          if (g.conflicts.has(r + '-' + c)) {
            cell.classList.add('cell-conflict');
          }

          // Game-over dimming (applied after highlight so highlight can override)
          if (g.isGameOver) {
            cell.classList.add('cell-gameover');
          }
        }
      }

      // Selected cell highlight
      if (g.selectedCell) {
        var sel = document.querySelector('.cell[data-row="' + g.selectedCell.row + '"][data-col="' + g.selectedCell.col + '"]');
        if (sel) sel.classList.add('cell-selected');

        // Same-number highlight
        var same = g.getSameNumberCells(g.selectedCell.row, g.selectedCell.col);
        same.forEach(function(pair) {
          var sr = pair[0], sc = pair[1];
          var cEl = document.querySelector('.cell[data-row="' + sr + '"][data-col="' + sc + '"]');
          if (cEl && !(sr === g.selectedCell.row && sc === g.selectedCell.col)) {
            cEl.classList.add('cell-same-number');
          }
        });
      }

      // Number highlight (when no cell selected but highlightedNumber set)
      if (g.highlightedNumber !== null && g.highlightedNumber !== undefined) {
        var hlCells = g.getNumberCells(g.highlightedNumber);
        hlCells.forEach(function(cell) {
          var cEl = document.querySelector('.cell[data-row="' + cell.row + '"][data-col="' + cell.col + '"]');
          if (cEl) cEl.classList.add('cell-highlight');
        });
      }

      // Notes toggle button state
      var notesBtn = document.getElementById('notes-toggle-btn');
      if (notesBtn) {
        if (g.notesMode) {
          notesBtn.classList.add('active');
        } else {
          notesBtn.classList.remove('active');
        }
      }

      // Error counter
      var errCounter = document.getElementById('error-counter');
      if (errCounter) {
        var statusStr = g.errorStatus();
        errCounter.textContent = '错误 ' + statusStr;
        var parts = statusStr.split('/');
        var remaining = parseInt(parts[1]) - parseInt(parts[0]);
        errCounter.classList.remove('err-ok', 'err-warn', 'err-danger');
        if (remaining >= 2) {
          errCounter.classList.add('err-ok');
        } else if (remaining === 1) {
          errCounter.classList.add('err-warn');
        } else {
          errCounter.classList.add('err-danger');
        }
      }

      // Timer
      var timerEl = document.getElementById('timer');
      if (timerEl) {
        timerEl.textContent = g.getTimeString();
      }

      // Smart numpad — disable conflicting numbers when blank cell selected
      var numBtns = document.querySelectorAll('.num-btn:not(.erase-btn)');
      if (g.selectedCell && !g.isGiven(g.selectedCell.row, g.selectedCell.col) && !g.isComplete && !g.isGameOver) {
        var validNums = g.getValidNumbers(g.selectedCell.row, g.selectedCell.col);
        numBtns.forEach(function(btn) {
          var n = parseInt(btn.textContent);
          if (validNums.indexOf(n) === -1) {
            btn.classList.add('num-disabled');
          } else {
            btn.classList.remove('num-disabled');
          }
        });
      } else {
        numBtns.forEach(function(btn) {
          btn.classList.remove('num-disabled');
        });
      }

      // Win modal
      if (g.isComplete && !g.isGameOver) {
        document.getElementById('win-modal').style.display = 'flex';
      } else {
        document.getElementById('win-modal').style.display = 'none';
      }

      // Lose modal
      if (g.isGameOver) {
        document.getElementById('lose-modal').style.display = 'flex';
      } else {
        document.getElementById('lose-modal').style.display = 'none';
      }

      // Wrong answer flash effect
      if (g.consumeWrongAnswerFlash && g.consumeWrongAnswerFlash()) {
        document.body.classList.add('wrong-answer-flash');
        setTimeout(function() {
          document.body.classList.remove('wrong-answer-flash');
        }, 400);
      }
    }

    // Timer update every second while running
    setInterval(function() {
      if (window.game && window.game.timerRunning) {
        var timerEl = document.getElementById('timer');
        if (timerEl) timerEl.textContent = window.game.getTimeString();
      }
    }, 1000);

    // Init game: load save or start fresh
    (function initGame() {
      var savedDifficulty = localStorage.getItem('sudoku_last_difficulty') || 'medium';
      var saved = SudokuGame.hasSave(savedDifficulty) ? SudokuGame.loadGame(savedDifficulty) : null;
      if (saved) {
        window.game = saved;
        var sel = document.getElementById('difficulty-select');
        if (sel) sel.value = savedDifficulty;
      }
      render();
    })();

    // Save on page unload
    window.addEventListener('beforeunload', function() {
      if (window.game && !window.game.isComplete && !window.game.isGameOver) {
        window.game.saveGame();
        localStorage.setItem('sudoku_last_difficulty', window.game.difficulty);
      }
    });

    // Save on Electron quit (IPC from main process)
    if (window.electronAPI && window.electronAPI.onSaveBeforeQuit) {
      window.electronAPI.onSaveBeforeQuit(function() {
        if (window.game && !window.game.isComplete && !window.game.isGameOver) {
          window.game.saveGame();
          localStorage.setItem('sudoku_last_difficulty', window.game.difficulty);
        }
      });
    }
  </script>
</body>
